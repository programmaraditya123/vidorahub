<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VidoraHub - Offline</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        height: 100vh;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 20px;
        max-width: 400px;
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #38bdf8;
      }

      .loader {
        margin: 30px auto;
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      .title {
        font-size: 20px;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 20px;
      }

      .btn {
        padding: 10px 20px;
        background: #38bdf8;
        border: none;
        border-radius: 8px;
        color: black;
        font-weight: 600;
        cursor: pointer;
      }

      .btn:active {
        transform: scale(0.95);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">VidoraHub</div>

      <div class="loader"></div>

      <div class="title">No Internet Connection</div>
      <div class="subtitle">Please check your network and try again.</div>

      <button class="btn" onclick="retry()">Retry</button>
    </div>

    <script>
      function retry() {
        if (navigator.onLine) {
          window.location.href = "/";
        } else {
          alert("Still offline. Please check your connection.");
        }
      }

      // Auto retry when back online
      window.addEventListener("online", () => {
        window.location.href = "/";
      });
    </script>
    <script>
      setInterval(() => {
        if (navigator.onLine) {
          window.location.href = "/";
        }
      }, 5000); // retry every 5 sec
    </script>
  </body>
</html>
